spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: thisIsVerySecretKeyForJwtDontUseThisInProduction
  expiration: 3600000

app:
  frontend-url: http://192.168.1.10:5173