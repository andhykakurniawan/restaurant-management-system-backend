spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurant_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:thisIsVerySecretKeyForJwtDontUseThisInProduction}
  expiration: ${JWT_EXPIRATION:3600000}

app:
  frontend-url: ${FRONTEND_URL:http://192.168.1.10:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://192.168.1.10:5173}
  security:
    relaxed-permit-all: ${RELAXED_PERMIT_ALL:true}

midtrans:
  server-key: ${MIDTRANS_SERVER_KEY:}
  client-key: ${MIDTRANS_CLIENT_KEY:}
  snap-url: ${MIDTRANS_SNAP_URL:https://app.sandbox.midtrans.com/snap/v1/transactions}
  verify-signature: ${MIDTRANS_VERIFY_SIGNATURE:false}
